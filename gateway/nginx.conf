worker_processes 1;

events {
    worker_connections 1024;
}

http {
    # ── Cài đặt chung ─────────────────────────────────────────────
    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 500M;   # Cho phép upload video dung lượng lớn

    # ── Nén Gzip — giảm băng thông response JSON ──────────────────
    gzip on;
    gzip_types application/json text/plain text/css application/javascript;
    gzip_min_length 1024;
    gzip_comp_level 5;

    # ── Định dạng log ──────────────────────────────────────────────
    log_format main '$remote_addr [$time_local] "$request" '
                    '$status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Rate limiting — chống spam/brute-force ─────────────────────
    # Zone chung cho toàn API: 60 req/phút mỗi IP
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=60r/m;
    # Zone chặt hơn cho các endpoint nhạy cảm: 10 req/phút
    limit_req_zone $binary_remote_addr zone=api_auth:10m rate=10r/m;
    limit_req_status 429;

    # ── Upstream services ──────────────────────────────────────────
    upstream auth_service {
        server auth-service:5001;
        keepalive 8;
    }

    upstream course_service {
        server course-service:5002;
        keepalive 8;
    }

    upstream lesson_service {
        server lesson-service:5003;
        keepalive 8;
    }

    upstream progress_service {
        server progress-service:5004;
        keepalive 8;
    }

    upstream quiz_service {
        server quiz-service:5005;
        keepalive 8;
    }

    upstream frontend_service {
        server frontend:3000;
    }

    server {
        listen 8000;
        server_name _;

        # ── CORS Headers ───────────────────────────────────────────
        add_header 'Access-Control-Allow-Origin'  '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS, PATCH' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept' always;

        # Trả về ngay với preflight OPTIONS (không cần chuyển đến service)
        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # ── Cài đặt proxy chung ────────────────────────────────────
        proxy_http_version 1.1;
        proxy_set_header Connection "";            # bật keepalive lên upstream
        proxy_connect_timeout  5s;                 # timeout kết nối đến service
        proxy_read_timeout     60s;                # timeout chờ response (video streaming)
        proxy_send_timeout     10s;
        proxy_next_upstream    error timeout;      # tự retry nếu service lỗi

        # ── Auth Service ───────────────────────────────────────────
        # Endpoint đăng nhập/đăng ký: rate limit chặt hơn (chống brute-force)
        location ~ ^/api/auth/(login|register|logout)$ {
            limit_req zone=api_auth burst=5 nodelay;
            rewrite ^/api/auth/(.*)$ /auth/$1 break;
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Các endpoint auth còn lại: rate limit bình thường
        location /api/auth/ {
            limit_req zone=api_general burst=20 nodelay;
            rewrite ^/api/auth/(.*)$ /auth/$1 break;
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Course Service ─────────────────────────────────────────
        location /api/courses/ {
            limit_req zone=api_general burst=30 nodelay;
            rewrite ^/api/courses/(.*)$ /courses/$1 break;
            proxy_pass http://course_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/courses {
            limit_req zone=api_general burst=30 nodelay;
            proxy_pass http://course_service/courses;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Lesson Service ─────────────────────────────────────────
        # Streaming video — không rate limit, không buffer
        location ~ ^/api/lessons/[^/]+/stream$ {
            proxy_pass http://lesson_service;
            rewrite ^/api/lessons/(.*)$ /lessons/$1 break;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Range $http_range;
            proxy_buffering off;              # tắt buffer để streaming mượt
            proxy_request_buffering off;
            proxy_read_timeout 3600s;         # cho phép stream video dài
        }

        location /api/lessons/ {
            limit_req zone=api_general burst=30 nodelay;
            rewrite ^/api/lessons/(.*)$ /lessons/$1 break;
            proxy_pass http://lesson_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_buffering off;
            proxy_request_buffering off;
        }

        location /api/lessons {
            limit_req zone=api_general burst=30 nodelay;
            proxy_pass http://lesson_service/lessons;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
        }

        # ── Progress Service ───────────────────────────────────────
        location /api/progress/ {
            limit_req zone=api_general burst=60 nodelay;   # update tiến độ thường xuyên
            rewrite ^/api/progress/(.*)$ /progress/$1 break;
            proxy_pass http://progress_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/progress {
            limit_req zone=api_general burst=60 nodelay;
            proxy_pass http://progress_service/progress;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Quiz Service ───────────────────────────────────────────
        location /api/quiz/ {
            limit_req zone=api_general burst=20 nodelay;
            rewrite ^/api/quiz/(.*)$ /quiz/$1 break;
            proxy_pass http://quiz_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/quiz {
            limit_req zone=api_general burst=20 nodelay;
            proxy_pass http://quiz_service/quiz;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Health Check từng service (qua gateway) ────────────────
        location = /api/health {
            return 200 '{"status":"ok","service":"gateway","version":"1.0.0"}';
            add_header Content-Type application/json;
        }

        location = /api/auth/health    { proxy_pass http://auth_service/health; }
        location = /api/courses/health { proxy_pass http://course_service/health; }
        location = /api/lessons/health { proxy_pass http://lesson_service/health; }
        location = /api/progress/health { proxy_pass http://progress_service/health; }
        location = /api/quiz/health    { proxy_pass http://quiz_service/health; }

        # ── Frontend SPA (catch-all) ───────────────────────────────
        location / {
            proxy_pass http://frontend_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Upgrade $http_upgrade;     # hỗ trợ WebSocket/HMR
            proxy_set_header Connection "upgrade";
        }
    }
}
