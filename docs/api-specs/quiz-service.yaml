openapi: 3.0.3
info:
  title: Quiz Service API
  description: |
    Quản lý bài kiểm tra, câu hỏi và chấm điểm tự động.
    Đáp án đúng (correct_index) không bao giờ trả về client.
    Base path qua gateway: /api/quiz
  version: 1.0.0

servers:
  - url: http://localhost:8080/api
    description: Qua Gateway (khuyến nghị)
  - url: http://localhost:5005
    description: Trực tiếp (nội bộ Docker)

paths:
  /quiz/health:
    get:
      summary: Health check
      operationId: quizHealth
      responses:
        '200':
          description: Service đang hoạt động
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /quiz/course/{course_id}:
    get:
      summary: Danh sách quiz theo khóa học
      operationId: listQuizzes
      parameters:
        - $ref: '#/components/parameters/courseId'
      responses:
        '200':
          description: Danh sách quiz (không có đáp án đúng)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/QuizResponse'

  /quiz:
    post:
      summary: Tạo quiz kèm câu hỏi (Teacher only, một request)
      operationId: createQuiz
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuizCreate'
      responses:
        '201':
          description: Quiz đã được tạo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuizResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /quiz/{quiz_id}:
    get:
      summary: Chi tiết quiz (ẩn đáp án đúng)
      operationId: getQuiz
      parameters:
        - $ref: '#/components/parameters/quizId'
      responses:
        '200':
          description: Thông tin quiz và câu hỏi
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuizResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Xóa quiz và toàn bộ dữ liệu liên quan (Teacher only)
      operationId: deleteQuiz
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/quizId'
      responses:
        '204':
          description: Đã xóa
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /quiz/{quiz_id}/submit:
    post:
      summary: Nộp bài kiểm tra và nhận kết quả tự động
      operationId: submitQuiz
      description: |
        Chấm điểm: score = (số câu đúng / tổng câu) × 100
        Kết quả passed = score >= pass_score
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/quizId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttemptSubmit'
      responses:
        '200':
          description: Kết quả bài làm
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttemptResponse'
        '400':
          description: Quiz không có câu hỏi
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /quiz/{quiz_id}/attempts:
    get:
      summary: Lịch sử làm bài của học viên hiện tại
      operationId: getAttempts
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/quizId'
      responses:
        '200':
          description: Danh sách lượt làm bài (mới nhất trước)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AttemptResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    courseId:
      name: course_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    quizId:
      name: quiz_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    Unauthorized:
      description: Token không hợp lệ hoặc chưa đăng nhập
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Không có quyền thực hiện thao tác này
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Không tìm thấy resource
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok

    ErrorResponse:
      type: object
      properties:
        detail:
          type: object
          properties:
            error:
              type: string

    QuestionCreate:
      type: object
      required: [text, options, correct_index]
      properties:
        text:
          type: string
          example: Python là ngôn ngữ gì?
        options:
          type: array
          items:
            type: string
          example: ["Biên dịch", "Thông dịch", "Hợp ngữ", "Máy"]
        correct_index:
          type: integer
          description: Chỉ số (0-based) của đáp án đúng trong mảng options
          example: 1
        order:
          type: integer
          default: 0

    QuestionResponse:
      type: object
      description: Câu hỏi trả về cho client (KHÔNG có correct_index)
      properties:
        id:
          type: string
          format: uuid
        text:
          type: string
        options:
          type: array
          items:
            type: string
        order:
          type: integer

    QuizCreate:
      type: object
      required: [course_id, title, questions]
      properties:
        course_id:
          type: string
          format: uuid
        title:
          type: string
          example: Kiểm tra cuối chương 1
        description:
          type: string
          nullable: true
        pass_score:
          type: number
          default: 70
          description: Điểm tối thiểu để đạt (%)
        questions:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/QuestionCreate'

    QuizResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        course_id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        pass_score:
          type: number
        created_at:
          type: string
          format: date-time
        questions:
          type: array
          items:
            $ref: '#/components/schemas/QuestionResponse'

    AttemptSubmit:
      type: object
      required: [answers]
      properties:
        answers:
          type: object
          additionalProperties:
            type: integer
          description: Map question_id -> chỉ số đáp án học viên chọn (0-based)
          example:
            "uuid-question-1": 1
            "uuid-question-2": 0

    AttemptResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        quiz_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        answers:
          type: object
          additionalProperties:
            type: integer
        score:
          type: number
          description: Điểm số (0-100)
          example: 80.0
        passed:
          type: boolean
        submitted_at:
          type: string
          format: date-time
