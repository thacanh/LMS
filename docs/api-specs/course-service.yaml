openapi: 3.0.3
info:
  title: Course Service API
  description: |
    Quản lý khóa học. Học viên xem danh sách; giáo viên CRUD khóa học của mình.
    Base path qua gateway: /api/courses
  version: 1.0.0

servers:
  - url: http://localhost:8080/api
    description: Qua Gateway (khuyến nghị)
  - url: http://localhost:5002
    description: Trực tiếp (nội bộ Docker)

paths:
  /courses/health:
    get:
      summary: Health check
      operationId: courseHealth
      responses:
        '200':
          description: Service đang hoạt động
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /courses:
    get:
      summary: Danh sách khóa học đã xuất bản (public)
      operationId: listCourses
      parameters:
        - name: skip
          in: query
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Danh sách khóa học
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CourseResponse'
    post:
      summary: Tạo khóa học mới (Teacher only)
      operationId: createCourse
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CourseCreate'
      responses:
        '201':
          description: Khóa học đã được tạo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /courses/all:
    get:
      summary: Tất cả khóa học của giáo viên (kể cả bản nháp)
      operationId: listAllCourses
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Danh sách khóa học của giáo viên hiện tại
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CourseResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /courses/{course_id}:
    get:
      summary: Chi tiết một khóa học
      operationId: getCourse
      parameters:
        - $ref: '#/components/parameters/courseId'
      responses:
        '200':
          description: Thông tin khóa học
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      summary: Cập nhật khóa học (chỉ chủ sở hữu)
      operationId: updateCourse
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/courseId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CourseUpdate'
      responses:
        '200':
          description: Cập nhật thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Xóa khóa học (chỉ chủ sở hữu)
      operationId: deleteCourse
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/courseId'
      responses:
        '204':
          description: Đã xóa
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    courseId:
      name: course_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    Unauthorized:
      description: Token không hợp lệ hoặc chưa đăng nhập
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Không có quyền thực hiện thao tác này
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Không tìm thấy resource
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok

    ErrorResponse:
      type: object
      properties:
        detail:
          type: object
          properties:
            error:
              type: string

    CourseCreate:
      type: object
      required: [title]
      properties:
        title:
          type: string
          example: Lập trình Python cơ bản
        description:
          type: string
          nullable: true
        thumbnail_url:
          type: string
          nullable: true
        is_published:
          type: boolean
          default: false

    CourseUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
          nullable: true
        thumbnail_url:
          type: string
          nullable: true
        is_published:
          type: boolean

    CourseResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        teacher_id:
          type: string
          format: uuid
        teacher_name:
          type: string
        thumbnail_url:
          type: string
          nullable: true
        is_published:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
