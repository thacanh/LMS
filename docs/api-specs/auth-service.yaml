openapi: 3.0.3
info:
  title: Auth Service API
  description: |
    Xác thực người dùng, quản lý JWT token và thông tin tài khoản.
    Base path qua gateway: /api/auth
  version: 1.0.0

servers:
  - url: http://localhost:8080/api
    description: Qua Gateway (khuyến nghị)
  - url: http://localhost:5001
    description: Trực tiếp (nội bộ Docker)

paths:
  /auth/health:
    get:
      summary: Health check
      operationId: authHealth
      responses:
        '200':
          description: Service đang hoạt động
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /auth/register:
    post:
      summary: Đăng ký tài khoản mới
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Tài khoản đã được tạo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /auth/login:
    post:
      summary: Đăng nhập và nhận JWT token
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Đăng nhập thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      summary: Đăng xuất
      operationId: logout
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Đăng xuất thành công
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/me:
    get:
      summary: Lấy thông tin người dùng hiện tại
      operationId: getMe
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Thông tin tài khoản
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      summary: Cập nhật họ tên hoặc mật khẩu
      operationId: updateMe
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
      responses:
        '200':
          description: Cập nhật thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/validate:
    get:
      summary: Xác thực JWT token (dùng cho debug / service nội bộ)
      operationId: validateToken
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Token hợp lệ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenValidateResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/users:
    get:
      summary: Danh sách người dùng (Teacher only)
      operationId: listUsers
      security:
        - bearerAuth: []
      parameters:
        - name: role
          in: query
          schema:
            type: string
            enum: [student, teacher]
          description: Lọc theo role
      responses:
        '200':
          description: Danh sách người dùng
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    BadRequest:
      description: Dữ liệu đầu vào không hợp lệ
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Token không hợp lệ hoặc chưa đăng nhập
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Không có quyền thực hiện thao tác này
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Không tìm thấy resource
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok

    ErrorResponse:
      type: object
      properties:
        detail:
          type: object
          properties:
            error:
              type: string

    RegisterRequest:
      type: object
      required: [email, full_name, password, role]
      properties:
        email:
          type: string
          format: email
          example: hocvien@example.com
        full_name:
          type: string
          example: Nguyen Van A
        password:
          type: string
          minLength: 6
          example: secret123
        role:
          type: string
          enum: [student, teacher]

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
        token_type:
          type: string
          example: bearer
        role:
          type: string
          enum: [student, teacher]
        user_id:
          type: string
          format: uuid

    TokenValidateResponse:
      type: object
      properties:
        valid:
          type: boolean
        user_id:
          type: string
        email:
          type: string
        role:
          type: string

    UserResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        full_name:
          type: string
        role:
          type: string
          enum: [student, teacher]
        created_at:
          type: string
          format: date-time

    UserUpdateRequest:
      type: object
      properties:
        full_name:
          type: string
        password:
          type: string
          minLength: 6
