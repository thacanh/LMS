# Docker Compose — LMS Microservices
# Chạy: docker compose up --build

services:
  # ─── Shared MySQL ────────────────────────────────────
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./scripts/init-databases.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─── Auth Service — port 5001 ──────────────────────────
  auth-service:
    build: ./services/auth-service
    env_file: .env
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Course Service — port 5002 ────────────────────────
  course-service:
    build: ./services/course-service
    env_file: .env
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Lesson Service — port 5003 ────────────────────────
  lesson-service:
    build: ./services/lesson-service
    env_file: .env
    volumes:
      - video-data:/app/videos
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5003/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Progress Service — port 5004 ──────────────────────
  progress-service:
    build: ./services/progress-service
    env_file: .env
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5004/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Quiz Service — port 5005 ──────────────────────────
  quiz-service:
    build: ./services/quiz-service
    env_file: .env
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5005/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── API Gateway (Nginx) ──────────────────────────────
  gateway:
    build: ./gateway
    ports:
      - "${GATEWAY_PORT:-8080}:8000"
    depends_on:
      - auth-service
      - course-service
      - lesson-service
      - progress-service
      - quiz-service
    networks:
      - app-network

  # ─── Frontend (React) ─────────────────────────────────
  frontend:
    build: ./frontend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mysql-data:
  video-data:
